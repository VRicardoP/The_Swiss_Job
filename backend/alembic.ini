[alembic]
script_location = alembic
# sqlalchemy.url se sobrescribe en alembic/env.py con settings.DATABASE_URL
# (lee env vars + .env vía pydantic-settings). El valor aquí solo aplica si
# alguien corre alembic FUERA del entrypoint del contenedor.
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

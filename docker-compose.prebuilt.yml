# SwissJobHunter — stack producción, versión PREBUILT.
#
# A diferencia de docker-compose.prod.yml, este NO construye nada en el NAS.
# Asume que las imágenes swissjob-backend:prod y swissjob-frontend:prod
# ya están cargadas en el daemon (vía `docker load -i swissjob-backend.tar`).
#
# Despliegue:
#   docker load -i swissjob-backend.tar
#   docker load -i swissjob-frontend.tar
#   docker compose -f docker-compose.prebuilt.yml up -d
#
# Acceso desde la tailnet:
#   http://capsule.tailebc81d.ts.net:8080

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: swissjob-postgres
    restart: unless-stopped
    # env_file en lugar de ${VAR} en environment: así el servicio NO depende
    # de que quien lance compose le pase `--env-file .env.prod`. Container
    # Station (QNAP) no inyecta .env.prod automáticamente, y sin él las
    # sustituciones quedaban vacías → el init de Postgres usaba un password
    # distinto del que mandaba el backend → InvalidPasswordError al conectar.
    env_file:
      - .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    healthcheck:
      # $$ escapa la sustitución de compose; el shell del contenedor resuelve
      # $POSTGRES_USER / $POSTGRES_DB con su propio entorno (cargado vía env_file).
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swissjob-net

  redis:
    image: redis:7-alpine
    container_name: swissjob-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swissjob-net

  backend:
    image: swissjob-backend:prod
    container_name: swissjob-backend
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Cache de HuggingFace persistente — evita re-descargar el modelo
      # paraphrase-multilingual-MiniLM-L12-v2 (~120 MB) en cada recreate.
      - hfcache:/home/app/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      # start_period generoso: el primer arranque carga el modelo embedding
      # (~120 MB) en CPU del NAS, hasta 5 min. Después del primer arranque
      # el modelo queda en hfcache y los siguientes recreates son <60s.
      start_period: 360s
      retries: 5
    networks:
      - swissjob-net

  worker:
    image: swissjob-backend:prod
    container_name: swissjob-worker
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      # Compartido con backend: el worker también usa el modelo embedding
      # para tareas de matching que llegan a la queue.
      - hfcache:/home/app/.cache/huggingface
    entrypoint: []
    command:
      - celery
      - -A
      - celery_app
      - worker
      - -Q
      - default,scraping,ai
      - --concurrency=2
      - --loglevel=info
    networks:
      - swissjob-net

  frontend:
    image: swissjob-frontend:prod
    container_name: swissjob-frontend
    restart: unless-stopped
    ports:
      # Puerto 4000 en el host del NAS — los 8080 y 8090 están ocupados por
      # paneles internos de QTS. Si lo cambias, actualiza también
      # BACKEND_CORS_ORIGINS en .env.prod.
      - "4000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - swissjob-net

networks:
  swissjob-net:
    driver: bridge

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  hfcache:
    driver: local

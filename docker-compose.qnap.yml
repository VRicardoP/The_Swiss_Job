# SwissJobHunter — versión específica para Container Station QNAP.
# Self-contained: rutas absolutas para volúmenes y env_file.
# Container Station NO expande ${VARS} ni resuelve env_file relativo, por eso
# todos los paths van absolutos: /share/Public/swissjob/...
# Todos los servicios que necesitan credenciales (postgres, backend, worker)
# leen del mismo .env.prod → imposible que se desincronicen.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: swissjob-postgres
    restart: unless-stopped
    # env_file con path absoluto (Container Station QNAP no resuelve paths
    # relativos). Misma fuente de credenciales que backend y worker:
    # imposible que postgres y backend usen passwords distintos.
    env_file:
      - /share/Public/swissjob/.env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
      - /share/Public/swissjob/docker/postgres/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    healthcheck:
      # $$ escapa la sustitución de compose; el shell del contenedor resuelve
      # $POSTGRES_USER / $POSTGRES_DB con su propio entorno (cargado vía env_file).
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swissjob-net

  redis:
    image: redis:7-alpine
    container_name: swissjob-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swissjob-net

  backend:
    image: swissjob-backend:prod
    container_name: swissjob-backend
    restart: unless-stopped
    env_file:
      - /share/Public/swissjob/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Cache de HuggingFace persistente — evita re-descargar el modelo
      # paraphrase-multilingual-MiniLM-L12-v2 (~120 MB) en cada Recreate.
      - hfcache:/home/app/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      # start_period generoso: el primer arranque carga el modelo embedding
      # (~120 MB) en CPU del NAS, ~4-5 min. Después del primer arranque el
      # modelo queda en el volumen hfcache y el siguiente Recreate es <60s.
      start_period: 360s
      retries: 5
    networks:
      - swissjob-net

  worker:
    image: swissjob-backend:prod
    container_name: swissjob-worker
    restart: unless-stopped
    env_file:
      - /share/Public/swissjob/.env.prod
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      # Compartido con el backend — el worker también usa el modelo embedding
      # para tareas de matching que llegan a la queue.
      - hfcache:/home/app/.cache/huggingface
    entrypoint: []
    command:
      - celery
      - -A
      - celery_app
      - worker
      - -Q
      - default,scraping,ai
      - --concurrency=2
      - --loglevel=info
    networks:
      - swissjob-net

  frontend:
    image: swissjob-frontend:prod
    container_name: swissjob-frontend
    restart: unless-stopped
    ports:
      # Puerto 4000 en el host del NAS — los 8080 y 8090 están ocupados por
      # paneles internos de QTS. Si lo cambias, actualiza también
      # BACKEND_CORS_ORIGINS en .env.prod.
      - "4000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - swissjob-net

networks:
  swissjob-net:
    driver: bridge

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  hfcache:
    driver: local

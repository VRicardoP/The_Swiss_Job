# nginx vhost — sirve la SPA y hace proxy de /api al backend.
# Diseñado para acceso via Tailscale; sin SSL (Tailscale ya encripta).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip básico — buena para los chunks de Vite
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/xml image/svg+xml font/woff2;
    gzip_min_length 256;

    # SPA: cualquier ruta desconocida cae en index.html (React Router resuelve)
    location / {
        try_files $uri $uri/ /index.html;

        # Los HTML no se cachean: el bundle JS sí, con hash en el nombre.
        add_header Cache-Control "no-cache";
    }

    # Assets de Vite tienen hash en el nombre → cache largo
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy hacia el backend (red interna de docker-compose)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # SSE necesita streams sin buffer, conexiones largas
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Healthcheck que Container Station usa para semáforo verde
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
